<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>貪食蛇遊戲</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --container-bg: #1e293b;
            --text-color: #f8fafc;
            --accent-color: #10b981;
            --board-bg: #020617;
            --snake-head: #059669;
            --snake-body: #34d399;
            --food-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            /* Prevent highlight on mobile click */
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-image: radial-gradient(circle at center, #1e293b 0%, #0f172a 100%);
            padding: 1rem;
        }

        .game-container {
            background-color: var(--container-bg);
            padding: 1.5rem;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5), inset 0 1px 0 rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 1.5rem;
            width: 100%;
            max-width: 500px;
        }

        .header {
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            font-family: 'Press Start 2P', cursive;
            font-size: 1.2rem;
            color: var(--accent-color);
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.4);
            letter-spacing: 1px;
        }

        .score-board {
            display: flex;
            gap: 0.5rem;
        }

        .score-box {
            background-color: rgba(0, 0, 0, 0.3);
            padding: 0.5rem 1rem;
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 70px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .label {
            font-size: 0.65rem;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 2px;
        }

        .value {
            font-size: 1.25rem;
            font-weight: 700;
            color: white;
            font-family: 'Press Start 2P', cursive;
        }

        .board-wrapper {
            position: relative;
            border: 4px solid #334155;
            border-radius: 12px;
            overflow: hidden;
            background-color: var(--board-bg);
            box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8), 0 5px 15px rgba(0,0,0,0.3);
            width: 100%;
        }

        canvas {
            display: block;
            width: 100%;
            height: auto;
            aspect-ratio: 1 / 1;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(15, 23, 42, 0.85);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            backdrop-filter: blur(4px);
            transition: opacity 0.3s ease;
            z-index: 10;
        }

        .overlay.hidden {
            opacity: 0;
            pointer-events: none;
        }

        #overlay-text {
            font-family: 'Press Start 2P', cursive;
            color: white;
            font-size: 1.2rem;
            text-align: center;
            line-height: 1.5;
            text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
        }

        .settings {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: rgba(0, 0, 0, 0.4);
            padding: 1rem;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 90%;
        }

        .setting-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            color: #e2e8f0;
            font-size: 0.85rem;
        }

        .setting-item select {
            background: #0f172a;
            color: #10b981;
            border: 1px solid #334155;
            padding: 0.4rem;
            border-radius: 6px;
            font-family: inherit;
            font-weight: bold;
            outline: none;
            cursor: pointer;
        }

        .setting-item input[type="checkbox"] {
            accent-color: #10b981;
            width: 1.1rem;
            height: 1.1rem;
            cursor: pointer;
            vertical-align: middle;
        }

        button#start-btn {
            background-color: var(--accent-color);
            color: #022c22;
            border: none;
            padding: 0.8rem 1.5rem;
            font-size: 0.9rem;
            font-weight: 700;
            font-family: 'Press Start 2P', cursive;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            box-shadow: 0 4px 0 #059669;
            margin-top: 0.5rem;
        }

        button#start-btn:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 #059669;
        }

        .controls {
            display: none;
        }

        .dpad {
            display: grid;
            grid-template-columns: repeat(3, 70px);
            grid-template-rows: repeat(3, 70px);
            gap: 15px;
            justify-content: center;
            margin-top: 0.5rem;
            padding: 1rem;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 50%;
        }

        .dpad-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background-color: #334155;
            border: 3px solid #475569;
            color: var(--accent-color);
            font-size: 1.5rem;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 -4px 0 rgba(0,0,0,0.3), 0 5px 15px rgba(0,0,0,0.4);
            touch-action: manipulation;
            user-select: none;
            transition: all 0.1s;
        }

        #btn-up { grid-column: 2; grid-row: 1; }
        #btn-left { grid-column: 1; grid-row: 2; }
        #btn-right { grid-column: 3; grid-row: 2; }
        #btn-down { grid-column: 2; grid-row: 3; }

        .dpad-btn:active, .dpad-btn.active-touch {
            background-color: var(--accent-color);
            border-color: #059669;
            color: #000;
            transform: translateY(4px);
            box-shadow: inset 0 2px 5px rgba(0,0,0,0.4);
        }

        @media (min-width: 600px) {
            .controls {
                display: block;
                color: #64748b;
                font-size: 0.9rem;
            }
            .game-container {
                padding: 2.5rem;
            }
            .dpad {
                grid-template-columns: repeat(3, 60px);
                grid-template-rows: repeat(3, 60px);
                gap: 10px;
            }
            .dpad-btn {
                width: 60px;
                height: 60px;
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <h1>貪食蛇</h1>
            <div class="score-board">
                <div class="score-box">
                    <span class="label">分數</span>
                    <span id="score" class="value">0</span>
                </div>
                <div class="score-box">
                    <span class="label">最高分</span>
                    <span id="high-score" class="value">0</span>
                </div>
            </div>
        </div>
        
        <div class="board-wrapper">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
            <div id="game-overlay" class="overlay">
                <h2 id="overlay-text">準備開始</h2>
                
                <div class="settings">
                    <div class="setting-item">
                        <label for="difficulty">難易度 (速度)</label>
                        <select id="difficulty">
                            <option value="150" selected>簡單 (慢)</option>
                            <option value="100">中等 (適中)</option>
                            <option value="60">困難 (快)</option>
                            <option value="40">極限</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>
                            <input type="checkbox" id="audio-enable" checked> 
                            <span>開啟 8-bit 音效</span>
                        </label>
                    </div>
                </div>

                <button id="start-btn">開始遊戲</button>
            </div>
        </div>
        
        <div class="controls">
            <p>鍵盤方向鍵 或 WASD | 空白鍵 開始</p>
        </div>

        <!-- 手機遊玩用的虛擬方向鍵 -->
        <div class="dpad">
            <button class="dpad-btn" id="btn-up">▲</button>
            <button class="dpad-btn" id="btn-left">◀</button>
            <button class="dpad-btn" id="btn-right">▶</button>
            <button class="dpad-btn" id="btn-down">▼</button>
        </div>
    </div>
    
    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('high-score');
        const overlay = document.getElementById('game-overlay');
        const overlayText = document.getElementById('overlay-text');
        const startBtn = document.getElementById('start-btn');
        const difficultySelect = document.getElementById('difficulty');
        const audioEnableCheckbox = document.getElementById('audio-enable');

        // --- 🎵 Web Audio API Setup for 8-bit Sounds ---
        const AudioContext = window.AudioContext || window.webkitAudioContext;
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function playTone(freq, type, duration, vol=0.1) {
            if(!audioEnableCheckbox.checked || !audioCtx) return;
            
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            
            gain.gain.setValueAtTime(vol, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + duration);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        const bgmNotes = [
            130.81, 155.56, 196.00, 155.56, 130.81, 155.56, 196.00, 233.08
        ];
        let bgmIndex = 0;
        let bgmInterval;

        function startBGM() {
            initAudio();
            if(bgmInterval) clearInterval(bgmInterval);
            bgmIndex = 0;
            
            bgmInterval = setInterval(() => {
                if (isPlaying && audioEnableCheckbox.checked && audioCtx) {
                    playTone(bgmNotes[bgmIndex], 'square', 0.15, 0.05);
                    bgmIndex = (bgmIndex + 1) % bgmNotes.length;
                }
            }, 200);
        }

        function stopBGM() {
            if(bgmInterval) clearInterval(bgmInterval);
        }

        function playEatSound() {
            initAudio();
            playTone(880, 'square', 0.1, 0.1); 
            setTimeout(() => playTone(1108.73, 'square', 0.15, 0.1), 50); 
        }

        function playGameOverSound() {
            initAudio();
            stopBGM();
            playTone(300, 'sawtooth', 0.2, 0.15);
            setTimeout(() => playTone(250, 'sawtooth', 0.2, 0.15), 200);
            setTimeout(() => playTone(200, 'sawtooth', 0.2, 0.15), 400);
            setTimeout(() => playTone(150, 'sawtooth', 0.4, 0.15), 600);
        }

        // --- 🐍 Game Logic ---
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let dx = 0;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoopInterval;
        let gameSpeed = 150; 
        let baseSpeed = 150; 
        let isPlaying = false;
        let isGameOver = false;

        highScoreElement.textContent = highScore;

        function initGame() {
            const startX = Math.floor(tileCount / 2);
            const startY = Math.floor(tileCount / 2);
            snake = [
                { x: startX, y: startY },
                { x: startX, y: startY + 1 },
                { x: startX, y: startY + 2 }
            ];
            
            dx = 0;
            dy = -1; 
            
            score = 0;
            
            baseSpeed = parseInt(difficultySelect.value);
            gameSpeed = baseSpeed;
            
            scoreElement.textContent = score;
            isGameOver = false;
            spawnFood();
        }

        function spawnFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            
            for (let part of snake) {
                if (part.x === food.x && part.y === food.y) {
                    spawnFood();
                    break;
                }
            }
        }

        function startGame() {
            initAudio(); 
            initGame();
            overlay.classList.add('hidden');
            isPlaying = true;
            
            startBGM(); 
            
            if (gameLoopInterval) clearInterval(gameLoopInterval);
            gameLoopInterval = setInterval(gameLoop, gameSpeed);
        }

        function gameOver() {
            isPlaying = false;
            isGameOver = true;
            clearInterval(gameLoopInterval);
            playGameOverSound();
            
            if (score > highScore) {
                highScore = score;
                localStorage.setItem('snakeHighScore', highScore);
                highScoreElement.textContent = highScore;
            }
            
            overlayText.innerHTML = `GAME OVER<br><br><span style="font-size: 1rem; color: #94a3b8">最終分數: ${score}</span>`;
            startBtn.textContent = '重試';
            overlay.classList.remove('hidden');
        }

        function clearCanvas() {
            ctx.fillStyle = '#020617';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            ctx.strokeStyle = '#0f172a';
            ctx.lineWidth = 1;
            for (let i = 0; i < tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                if (index === 0) {
                    ctx.fillStyle = '#059669'; 
                    ctx.shadowBlur = 10;
                    ctx.shadowColor = '#059669';
                } else {
                    ctx.fillStyle = '#34d399'; 
                    ctx.shadowBlur = 0;
                }
                
                const gap = 2;
                ctx.beginPath();
                ctx.roundRect(
                    part.x * gridSize + gap, 
                    part.y * gridSize + gap, 
                    gridSize - gap * 2, 
                    gridSize - gap * 2,
                    index === 0 ? 4 : 2 
                );
                ctx.fill();
            });
            ctx.shadowBlur = 0; 
        }

        function drawFood() {
            ctx.fillStyle = '#ef4444';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ef4444';
            
            const centerX = food.x * gridSize + gridSize / 2;
            const centerY = food.y * gridSize + gridSize / 2;
            const radius = (gridSize / 2) - 3;
            
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.fill();
            
            ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
            ctx.shadowBlur = 0;
            ctx.beginPath();
            ctx.arc(centerX - radius/3, centerY - radius/3, radius/3, 0, 2 * Math.PI);
            ctx.fill();
        }

        let lastFrameDx = 0;
        let lastFrameDy = 0;

        function moveSnake() {
            if (dx === 0 && dy === 0) return;
            
            lastFrameDx = dx;
            lastFrameDy = dy;
            
            const head = { x: snake[0].x + dx, y: snake[0].y + dy };
            
            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }
            
            for (let i = 0; i < snake.length; i++) {
                if (head.x === snake[i].x && head.y === snake[i].y) {
                    gameOver();
                    return;
                }
            }
            
            snake.unshift(head);
            
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                playEatSound(); 
                
                const speedCap = baseSpeed * 0.4; 
                if (gameSpeed > speedCap) {
                    gameSpeed -= Math.floor(baseSpeed * 0.05); 
                    clearInterval(gameLoopInterval);
                    gameLoopInterval = setInterval(gameLoop, gameSpeed);
                }
                
                spawnFood();
            } else {
                snake.pop(); 
            }
        }

        function gameLoop() {
            if (!isPlaying) return;
            moveSnake();
            if (!isGameOver) {
                clearCanvas();
                drawFood();
                drawSnake();
            }
        }

        function handleDirection(direction) {
            if (isGameOver) {
                startGame();
                return;
            }
            
            if (!isPlaying && !isGameOver) {
                if (overlay.classList.contains('hidden') === false) return;
            }
            
            const goingUp = lastFrameDy === -1;
            const goingDown = lastFrameDy === 1;
            const goingRight = lastFrameDx === 1;
            const goingLeft = lastFrameDx === -1;

            switch (direction) {
                case 'up':
                    if (!goingDown) { dx = 0; dy = -1; }
                    break;
                case 'down':
                    if (!goingUp) { dx = 0; dy = 1; }
                    break;
                case 'left':
                    if (!goingRight) { dx = -1; dy = 0; }
                    break;
                case 'right':
                    if (!goingLeft) { dx = 1; dy = 0; }
                    break;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "Space"].includes(e.code)) {
                e.preventDefault();
            }
            
            if (e.code === 'Space') {
                if (!isPlaying || isGameOver) {
                    startGame();
                    return;
                }
            }

            if (e.code === 'ArrowUp' || e.code === 'KeyW') handleDirection('up');
            else if (e.code === 'ArrowDown' || e.code === 'KeyS') handleDirection('down');
            else if (e.code === 'ArrowLeft' || e.code === 'KeyA') handleDirection('left');
            else if (e.code === 'ArrowRight' || e.code === 'KeyD') handleDirection('right');
        });

        startBtn.addEventListener('click', startGame);

        ['up', 'down', 'left', 'right'].forEach(dir => {
            const btn = document.getElementById(`btn-${dir}`);
            
            const handlePress = (e) => {
                e.preventDefault();
                btn.classList.add('active-touch');
                handleDirection(dir);
            };
            
            const handleRelease = (e) => {
                e.preventDefault();
                btn.classList.remove('active-touch');
            };
            
            btn.addEventListener('mousedown', handlePress);
            btn.addEventListener('mouseup', handleRelease);
            btn.addEventListener('mouseleave', handleRelease);
            
            btn.addEventListener('touchstart', handlePress, {passive: false});
            btn.addEventListener('touchend', handleRelease, {passive: false});
            btn.addEventListener('touchcancel', handleRelease, {passive: false});
        });

        initGame();
        clearCanvas();
        drawSnake();
    </script>
</body>
</html>
